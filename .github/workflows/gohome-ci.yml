name: gohome-ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - name: go vet
        run: go vet ./gohome/...
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          args: ./gohome/...
      - name: go test
        run: go test ./gohome/...
